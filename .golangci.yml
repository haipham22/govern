run:
  timeout: 5m
  tests: true
  build-tags: []

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  disable-all: true
  enable:
    # Bugs
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused

    # Style
    - gocritic
    - gofmt
    - misspell

    # Complexity
    - gocyclo

    # Performance
    - prealloc

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false

  gocyclo:
    min-complexity: 15

  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style

  staticcheck:
    checks: ["all"]

  prealloc:
    simple: true
    range-loops: true
    for-loops: false

issues:
  exclude-dirs:
    - .git
    - .claude
    - docs
    - plans
    - .idea

  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck

    # Exclude SA1012 in tests (nil Context is acceptable)
    - path: _test\.go
      linters:
        - staticcheck
      text: "SA1012"

    # Exclude SA1012 in examples
    - path: example_test\.go
      linters:
        - staticcheck
      text: "SA1012"

    # Exclude known issues from generated files
    - path: \.pb\.go$
      linters:
        - all

  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true

severity:
  default-severity: error
  case-sensitive: false
