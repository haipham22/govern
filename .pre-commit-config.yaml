default_stages: [pre-commit]

repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-json
      - id: pretty-format-json
      - id: mixed-line-ending
      - id: detect-private-key
      - id: fix-byte-order-marker

  # Local Go hooks
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --fix
        language: system
        types: [go]
        pass_filenames: false

      - id: gofmt
        name: gofmt
        entry: gofmt -w
        language: system
        types: [go]

      - id: goimports
        name: goimports
        entry: goimports -w -local github.com/haipham22/govern
        language: system
        types: [go]

      - id: go-test
        name: go-test
        entry: go test ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-build
        name: go-build
        entry: go build ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-mod-tidy
        name: go-mod-tidy
        entry: go mod tidy
        language: system
        types: [go]
        pass_filenames: false
