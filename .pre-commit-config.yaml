default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --fix
        language: system
        types: [go]
        pass_filenames: false

      - id: gofmt
        name: gofmt
        entry: gofmt -w
        language: system
        types: [go]

      - id: goimports
        name: goimports
        entry: goimports -w -local github.com/haipham22/govern
        language: system
        types: [go]
